<svg width="100%" viewBox="0 0 680 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes pulse-ring { 0% { r: 20; opacity: 0.8; } 100% { r: 90; opacity: 0; } }
      @keyframes pulse-ring2 { 0% { r: 20; opacity: 0.6; } 100% { r: 90; opacity: 0; } }
      @keyframes pulse-ring3 { 0% { r: 20; opacity: 0.4; } 100% { r: 90; opacity: 0; } }
      @keyframes sweep { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      @keyframes dot-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
      @keyframes circuit-flow { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -40; } }
      @media (prefers-reduced-motion: no-preference) {
        .pulse1 { animation: pulse-ring 2.4s ease-out infinite; }
        .pulse2 { animation: pulse-ring2 2.4s ease-out infinite 0.8s; }
        .pulse3 { animation: pulse-ring3 2.4s ease-out infinite 1.6s; }
        .sweep-arm { animation: sweep 4s linear infinite; transform-origin: 200px 120px; }
        .circuit-line { animation: circuit-flow 1.8s linear infinite; }
        .dot1 { animation: dot-blink 1.2s ease-in-out infinite; }
        .dot2 { animation: dot-blink 1.2s ease-in-out infinite 0.4s; }
        .dot3 { animation: dot-blink 1.2s ease-in-out infinite 0.8s; }
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <radialGradient id="radarBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#534AB7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#534AB7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sweepGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7F77DD" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7F77DD" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="radarClip">
      <circle cx="200" cy="120" r="88"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="680" height="140" fill="#050B18"/>

  <!-- Circuit traces left -->
  <g stroke="#534AB7" stroke-width="0.8" fill="none" opacity="0.4">
    <path class="circuit-line" stroke-dasharray="4 4" d="M20 60 H80 V90 H140"/>
    <path class="circuit-line" stroke-dasharray="4 4" stroke-dashoffset="-10" d="M20 100 H60 V130 H120 V160 H180"/>
    <path class="circuit-line" stroke-dasharray="4 4" stroke-dashoffset="-20" d="M20 160 H50 V140 H90"/>
    <circle class="dot1" cx="80" cy="90" r="2.5" fill="#7F77DD" stroke="none"/>
    <circle class="dot2" cx="120" cy="160" r="2.5" fill="#7F77DD" stroke="none"/>
    <circle class="dot3" cx="60" cy="100" r="2" fill="#AFA9EC" stroke="none"/>
  </g>

  <!-- Circuit traces right -->
  <g stroke="#534AB7" stroke-width="0.8" fill="none" opacity="0.4">
    <path class="circuit-line" stroke-dasharray="4 4" stroke-dashoffset="-5" d="M660 50 H600 V80 H540"/>
    <path class="circuit-line" stroke-dasharray="4 4" d="M660 120 H620 V150 H560 V170 H500"/>
    <path class="circuit-line" stroke-dasharray="4 4" stroke-dashoffset="-15" d="M660 170 H630 V145 H590"/>
    <circle class="dot2" cx="600" cy="80" r="2.5" fill="#7F77DD" stroke="none"/>
    <circle class="dot1" cx="560" cy="170" r="2.5" fill="#7F77DD" stroke="none"/>
    <circle class="dot3" cx="620" cy="150" r="2" fill="#AFA9EC" stroke="none"/>
  </g>

  <!-- Radar -->
  <circle cx="200" cy="120" r="88" fill="url(#radarBg)"/>
  <circle cx="200" cy="120" r="88" fill="none" stroke="#534AB7" stroke-width="0.5" opacity="0.5"/>
  <circle cx="200" cy="120" r="65" fill="none" stroke="#534AB7" stroke-width="0.5" opacity="0.4"/>
  <circle cx="200" cy="120" r="44" fill="none" stroke="#534AB7" stroke-width="0.5" opacity="0.35"/>
  <circle cx="200" cy="120" r="24" fill="none" stroke="#7F77DD" stroke-width="0.5" opacity="0.5"/>
  <line x1="200" y1="32" x2="200" y2="208" stroke="#534AB7" stroke-width="0.5" opacity="0.3"/>
  <line x1="112" y1="120" x2="288" y2="120" stroke="#534AB7" stroke-width="0.5" opacity="0.3"/>

  <!-- Pulse rings -->
  <circle class="pulse1" cx="200" cy="120" r="20" fill="none" stroke="#7F77DD" stroke-width="1.5"/>
  <circle class="pulse2" cx="200" cy="120" r="20" fill="none" stroke="#AFA9EC" stroke-width="1"/>
  <circle class="pulse3" cx="200" cy="120" r="20" fill="none" stroke="#534AB7" stroke-width="0.8"/>

  <!-- Sweep arm -->
  <g class="sweep-arm" clip-path="url(#radarClip2)">
    <path fill="#7F77DD" fill-opacity="0.12" d="M200,120 L288,32 A88,88,0,0,1,288,120 Z"/>
    <line x1="200" y1="120" x2="288" y2="32" stroke="#7F77DD" stroke-width="1.5" opacity="0.9"/>
  </g>

  <!-- Blips -->
  <circle cx="238" cy="78" r="3" fill="#AFA9EC" opacity="0.9"/>
  <circle cx="238" cy="78" r="6" fill="none" stroke="#7F77DD" stroke-width="0.8" opacity="0.5"/>
  <circle cx="166" cy="95" r="2" fill="#CECBF6" opacity="0.7"/>
  <circle cx="225" cy="145" r="2.5" fill="#AFA9EC" opacity="0.8"/>
  <circle cx="175" cy="148" r="1.5" fill="#7F77DD" opacity="0.6"/>
  <circle cx="200" cy="120" r="4" fill="#7F77DD"/>
  <circle cx="200" cy="120" r="7" fill="none" stroke="#7F77DD" stroke-width="1" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="310" y="105" fill="#EEEDFE" font-family="system-ui,sans-serif" font-size="38" font-weight="700" letter-spacing="-1">Radar<tspan fill="#7F77DD">OS</tspan></text>
  <text x="311" y="128" fill="#534AB7" font-family="system-ui,sans-serif" font-size="11" letter-spacing="3" font-weight="500">MARKET INTELLIGENCE PLATFORM</text>

  <!-- Module pills -->
  <rect x="311" y="142" width="62" height="16" rx="8" fill="#26215C"/>

  <text x="311" y="178" fill="#26215C" font-family="system-ui,sans-serif" font-size="10" letter-spacing="1">BY KHWARIZME S.A.R.L</text>

  <rect x="0" y="0" width="680" height="2" fill="#534AB7" opacity="0.6"/>
</svg>
