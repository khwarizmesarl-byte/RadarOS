<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>Analytics — LEGO Tracker</title>
  <style>
    :root {
      --bg: #080c14;
      --surface: #0d1420;
      --border: rgba(99,102,241,0.12);
      --border-hover: rgba(99,102,241,0.35);
      --text: #e2e8f0;
      --muted: #475569;
      --accent: #6366f1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .filter-bar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0.65rem 1.5rem; display: flex; align-items: center; gap: 0.6rem;
      flex-wrap: wrap; position: sticky; top: 0; z-index: 40;
    }
    .filter-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); white-space: nowrap; }
    .chip {
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: rgba(99,102,241,0.07); border: 1px solid rgba(99,102,241,0.18);
      border-radius: 5px; padding: 0.22rem 0.6rem; font-size: 0.7rem; font-weight: 500;
      color: #64748b; cursor: pointer; transition: all 0.12s; user-select: none; white-space: nowrap;
    }
    .chip:hover { border-color: var(--accent); color: #c7d2fe; }
    .chip.on { background: rgba(99,102,241,0.18); border-color: var(--accent); color: #c7d2fe; }
    .chip.off { opacity: 0.35; }
    .sep { width: 1px; height: 18px; background: rgba(99,102,241,0.1); flex-shrink: 0; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; transition: border-color 0.2s; }
    .card:hover { border-color: var(--border-hover); }
    .card-title { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 1rem; }
    .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; position: relative; overflow: hidden; transition: all 0.18s; }
    .kpi:hover { border-color: var(--border-hover); transform: translateY(-2px); }
    .kpi::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
    .kpi.c0::before{background:linear-gradient(90deg,#6366f1,#8b5cf6);}
    .kpi.c1::before{background:linear-gradient(90deg,#10b981,#06b6d4);}
    .kpi.c2::before{background:linear-gradient(90deg,#f59e0b,#ef4444);}
    .kpi.c3::before{background:linear-gradient(90deg,#06b6d4,#6366f1);}
    .kpi.c4::before{background:linear-gradient(90deg,#8b5cf6,#ec4899);}
    .kpi.c5::before{background:linear-gradient(90deg,#ef4444,#f59e0b);}
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: 0.63rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 0.45rem 0.7rem; border-bottom: 1px solid rgba(99,102,241,0.1); text-align: left; }
    tbody td { font-size: 0.76rem; padding: 0.45rem 0.7rem; border-bottom: 1px solid rgba(15,23,42,0.8); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(99,102,241,0.04); }
    .badge { display:inline-block; padding:0.12rem 0.5rem; border-radius:4px; font-size:0.63rem; font-weight:600; font-family:'JetBrains Mono',monospace; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }
    .fade-up { opacity:0; transform:translateY(10px); animation:fu 0.4s ease forwards; }
    @keyframes fu { to { opacity:1; transform:translateY(0); } }

    @media print {
      body { background: #080c14 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .filter-bar, #exportWrap, a[href="/"] { display: none !important; }
      #kpiRow > div { break-inside: avoid; }
      .card { break-inside: avoid; border: 1px solid #334155 !important; margin-bottom: 0.5rem; }
      canvas { max-width: 100% !important; }
      @page { margin: 1cm; size: A4 landscape; background: #080c14; }
    }

    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { background: #080c14 !important; }
      .filter-bar, #exportWrap, a[href="/"] { display: none !important; }
      nav, [style*="border-bottom"] > div:first-child > a { display: none !important; }
      .card { break-inside: avoid; page-break-inside: avoid; border: 1px solid #334155 !important; margin-bottom: 0.75rem; }
      #kpiRow { break-inside: avoid; }
      canvas { max-height: 260px !important; }
      @page { margin: 0.8cm; size: A4 landscape; background: #080c14; }
    }
  .theme-btn.active { border-color: var(--acc, #6366f1) !important; box-shadow: 0 0 0 2px var(--acc, #6366f1); }
  </style>
  <script src="/static/theme.js"></script>
</head>
<body>

<!-- Nav -->
<div style="padding:0.9rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
  <div style="display:flex;align-items:center;gap:1rem;">
    <a href="/" style="color:var(--muted);font-size:0.78rem;text-decoration:none;">← Dashboard</a>
    <span style="color:#1e293b">|</span>
    <span style="font-weight:700;font-size:1.05rem;letter-spacing:-0.02em;">Analytics</span>
  </div>
  <div style="display:flex;align-items:center;gap:0.5rem;">
    <div id="themeSwitcher" style="display:flex;align-items:center;gap:4px;"></div>
    <div id="lastUpdated" style="font-size:0.68rem;color:var(--muted);font-family:'JetBrains Mono',monospace;"></div>
    <div style="position:relative;display:inline-block" id="exportWrap">
      <button onclick="toggleExport()" style="background:#0d1420;border:1px solid rgba(99,102,241,0.25);color:#94a3b8;border-radius:7px;padding:0.35rem 0.85rem;font-size:0.78rem;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.12s;" onmouseover="this.style.borderColor='#6366f1';this.style.color='#c7d2fe'" onmouseout="this.style.borderColor='rgba(99,102,241,0.25)';this.style.color='#94a3b8'">
        &#8595; Export
      </button>
      <div id="exportMenu" style="display:none;position:absolute;right:0;top:calc(100% + 6px);background:#0d1420;border:1px solid rgba(99,102,241,0.2);border-radius:10px;min-width:190px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,0.6);overflow:hidden;">
        <div style="padding:0.4rem 0.75rem;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#475569;border-bottom:1px solid rgba(99,102,241,0.1);">Export Charts</div>
        <button onclick="exportChart('chartBrand')" style="width:100%;text-align:left;padding:0.55rem 0.9rem;font-size:0.8rem;color:#94a3b8;background:none;border:none;cursor:pointer;" onmouseover="this.style.background='rgba(99,102,241,0.08)';this.style.color='#c7d2fe'" onmouseout="this.style.background='none';this.style.color='#94a3b8'">Items per Brand (PNG)</button>
        <button onclick="exportChart('chartArrivals')" style="width:100%;text-align:left;padding:0.55rem 0.9rem;font-size:0.8rem;color:#94a3b8;background:none;border:none;cursor:pointer;" onmouseover="this.style.background='rgba(99,102,241,0.08)';this.style.color='#c7d2fe'" onmouseout="this.style.background='none';this.style.color='#94a3b8'">New Arrivals (PNG)</button>
        <button onclick="exportChart('chartTheme')" style="width:100%;text-align:left;padding:0.55rem 0.9rem;font-size:0.8rem;color:#94a3b8;background:none;border:none;cursor:pointer;" onmouseover="this.style.background='rgba(99,102,241,0.08)';this.style.color='#c7d2fe'" onmouseout="this.style.background='none';this.style.color='#94a3b8'">Items per Theme (PNG)</button>
        <button onclick="exportChart('chartDiscount')" style="width:100%;text-align:left;padding:0.55rem 0.9rem;font-size:0.8rem;color:#94a3b8;background:none;border:none;cursor:pointer;" onmouseover="this.style.background='rgba(99,102,241,0.08)';this.style.color='#c7d2fe'" onmouseout="this.style.background='none';this.style.color='#94a3b8'">Discounts (PNG)</button>
        <div style="border-top:1px solid rgba(99,102,241,0.1)"></div>
        <button onclick="exportAllCharts()" style="width:100%;text-align:left;padding:0.55rem 0.9rem;font-size:0.8rem;color:#a5b4fc;background:none;border:none;cursor:pointer;font-weight:600;" onmouseover="this.style.background='rgba(99,102,241,0.08)'" onmouseout="this.style.background='none'">&#x2B07; All Charts (PNG)</button>
        <div style="border-top:1px solid rgba(99,102,241,0.1)"></div>
        <button onclick="exportPDF()" style="width:100%;text-align:left;padding:0.55rem 0.9rem;font-size:0.8rem;color:#fcd34d;background:none;border:none;cursor:pointer;font-weight:600;" onmouseover="this.style.background='rgba(245,158,11,0.08)'" onmouseout="this.style.background='none'">&#x1F4C4; PDF (Print)</button>
      </div>
    </div>
  </div>
</div>

<!-- Filter Bar -->
<div class="filter-bar">
  <span class="filter-label">Stores</span>
  <div id="storeChips" style="display:flex;gap:0.35rem;flex-wrap:wrap;"></div>
  <div class="sep"></div>
  <span class="filter-label">Brands</span>
  <div id="brandChips" style="display:flex;gap:0.35rem;flex-wrap:wrap;"></div>
  <div class="sep"></div>
  <button onclick="resetFilters()" style="font-size:0.68rem;color:var(--muted);background:none;border:1px solid rgba(99,102,241,0.15);border-radius:5px;cursor:pointer;padding:0.2rem 0.5rem;transition:all 0.12s;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='#c7d2fe'" onmouseout="this.style.borderColor='rgba(99,102,241,0.15)';this.style.color='var(--muted)'">Reset ×</button>
</div>

<!-- Content -->
<div style="padding:1.25rem 1.5rem;">

  <!-- KPIs -->
  <div id="kpiRow" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:0.7rem;margin-bottom:1.2rem;"></div>

  <!-- Row 1 -->
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:1rem;margin-bottom:1rem;">
    <div class="card fade-up" style="animation-delay:0.05s">
      <div class="card-title">Items per Brand per Store</div>
      <div style="height:255px"><canvas id="chartBrand"></canvas></div>
    </div>
    <div class="card fade-up" style="animation-delay:0.1s">
      <div class="card-title">New Arrivals per Store (all time)</div>
      <div style="height:255px"><canvas id="chartArrivals"></canvas></div>
    </div>
  </div>

  <!-- Row 2 -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
    <div class="card fade-up" style="animation-delay:0.15s">
      <div class="card-title">Items per Theme</div>
      <div style="height:280px"><canvas id="chartTheme"></canvas></div>
    </div>
    <div class="card fade-up" style="animation-delay:0.2s">
      <div class="card-title">Discounted Items — Count &amp; Avg % Off</div>
      <div style="height:280px"><canvas id="chartDiscount"></canvas></div>
    </div>
  </div>

  <!-- Row 3 -->
  <div class="card fade-up" style="animation-delay:0.25s;margin-bottom:1rem;">
    <div class="card-title">Most Expensive Set per Brand &amp; Store</div>
    <div style="max-height:360px;overflow-y:auto;">
      <table><thead><tr><th>Store</th><th>Brand</th><th>Set Title</th><th>Item #</th><th style="text-align:right">Price</th></tr></thead>
      <tbody id="expensiveBody"></tbody></table>
    </div>
  </div>

</div>

<script>
const PAL = ['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#84cc16','#f97316','#14b8a6'];
const KPI_COLORS = ['#a5b4fc','#6ee7b7','#fcd34d','#67e8f9','#c4b5fd','#fca5a5'];
const STORE_COLORS = {
  Brickmania:{bg:'rgba(99,102,241,0.15)',fg:'#a5b4fc'},
  Bricking:{bg:'rgba(16,185,129,0.15)',fg:'#6ee7b7'},
  BRICKSHOP:{bg:'rgba(245,158,11,0.15)',fg:'#fcd34d'},
  KLAPTAP:{bg:'rgba(6,182,212,0.15)',fg:'#67e8f9'},
  Joueclubliban:{bg:'rgba(139,92,246,0.15)',fg:'#c4b5fd'},
  Thetoystorelb:{bg:'rgba(239,68,68,0.15)',fg:'#fca5a5'},
};
function sbadge(s){const c=STORE_COLORS[s]||{bg:'rgba(100,116,139,0.15)',fg:'#94a3b8'};return`<span class="badge" style="background:${c.bg};color:${c.fg}">${s}</span>`;}

const CHART_BASE = {
  responsive:true, maintainAspectRatio:false,
  plugins:{
    legend:{labels:{color:'#64748b',font:{size:10},padding:8,boxWidth:8}},
    tooltip:{backgroundColor:'#0d1420',borderColor:'rgba(99,102,241,0.25)',borderWidth:1,titleColor:'#e2e8f0',bodyColor:'#94a3b8',padding:9}
  },
  scales:{
    x:{ticks:{color:'#475569',font:{size:10}},grid:{color:'rgba(30,41,59,0.7)'}},
    y:{ticks:{color:'#475569',font:{size:10}},grid:{color:'rgba(30,41,59,0.7)'}}
  }
};

let RAW={}, CHARTS={};
let ALL_STORES=[], ALL_BRANDS=[];
let SEL_STORES=new Set(), SEL_BRANDS=new Set();

function activeStores(){ return SEL_STORES.size===0?[...ALL_STORES]:[...SEL_STORES]; }
function activeBrands(){ return SEL_BRANDS.size===0?[...ALL_BRANDS]:[...SEL_BRANDS]; }

function toggleFilter(type, val){
  const s = type==='stores'?SEL_STORES:SEL_BRANDS;
  s.has(val)?s.delete(val):s.add(val);
  buildChips();
  renderAll();
}
function resetFilters(){ SEL_STORES.clear(); SEL_BRANDS.clear(); buildChips(); renderAll(); }

function buildChips(){
  const sc=document.getElementById('storeChips');
  const bc=document.getElementById('brandChips');
  sc.innerHTML = ALL_STORES.map((s,i)=>`
    <div class="chip ${SEL_STORES.size>0&&!SEL_STORES.has(s)?'off':SEL_STORES.has(s)?'on':''}"
         onclick="toggleFilter('stores','${s}')">
      <span style="width:5px;height:5px;border-radius:50%;background:${PAL[i%PAL.length]};flex-shrink:0"></span>${s}
    </div>`).join('');
  bc.innerHTML = ALL_BRANDS.map(b=>`
    <div class="chip ${SEL_BRANDS.size>0&&!SEL_BRANDS.has(b)?'off':SEL_BRANDS.has(b)?'on':''}"
         onclick="toggleFilter('brands','${b.replace(/'/g,"\\'")}')">${b}</div>`).join('');
}

function kill(id){ if(CHARTS[id]){CHARTS[id].destroy();delete CHARTS[id];} }

// KPIs loaded inside init() below

// Brand chart
function renderBrand(){
  const stores=activeStores(), brands=activeBrands();
  const rows=RAW.brand.filter(r=>stores.includes(r.store)&&brands.includes(r.brand));
  const totals={};
  rows.forEach(r=>{totals[r.brand]=(totals[r.brand]||0)+r.count;});
  const top=Object.entries(totals).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([b])=>b);
  const bmap={};
  rows.forEach(r=>{if(!top.includes(r.brand))return;if(!bmap[r.brand])bmap[r.brand]={};bmap[r.brand][r.store]=r.count;});
  kill('chartBrand');
  CHARTS.chartBrand=new Chart(document.getElementById('chartBrand'),{
    type:'bar',
    data:{labels:top,datasets:stores.map((s,i)=>({label:s,data:top.map(b=>bmap[b]?.[s]||0),backgroundColor:PAL[i%PAL.length]+'aa',hoverBackgroundColor:PAL[i%PAL.length],borderRadius:3}))},
    options:{...CHART_BASE,scales:{x:{...CHART_BASE.scales.x,stacked:true},y:{...CHART_BASE.scales.y,stacked:true}}}
  });
}

// Arrivals doughnut
function renderArrivals(){
  const stores=activeStores();
  const rows=RAW.arrivals.filter(r=>stores.includes(r.store));
  kill('chartArrivals');
  if(!rows.length)return;
  CHARTS.chartArrivals=new Chart(document.getElementById('chartArrivals'),{
    type:'doughnut',
    data:{labels:rows.map(r=>r.store),datasets:[{data:rows.map(r=>r.count),backgroundColor:rows.map((_,i)=>PAL[i%PAL.length]+'cc'),borderColor:'#080c14',borderWidth:3,hoverOffset:6}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{...CHART_BASE.plugins,legend:{position:'bottom',labels:{color:'#64748b',font:{size:10},padding:8,boxWidth:8}}}}
  });
}

// Theme chart
function renderTheme(){
  const stores=activeStores();
  const rows=RAW.theme.filter(r=>stores.includes(r.store));
  const m={};rows.forEach(r=>{m[r.theme]=(m[r.theme]||0)+r.count;});
  const sorted=Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,12);
  kill('chartTheme');
  CHARTS.chartTheme=new Chart(document.getElementById('chartTheme'),{
    type:'bar',
    data:{labels:sorted.map(([t])=>t.length>22?t.slice(0,20)+'…':t),datasets:[{data:sorted.map(([,c])=>c),backgroundColor:sorted.map((_,i)=>PAL[i%PAL.length]+'88'),hoverBackgroundColor:sorted.map((_,i)=>PAL[i%PAL.length]),borderRadius:3}]},
    options:{...CHART_BASE,indexAxis:'y',plugins:{...CHART_BASE.plugins,legend:{display:false}},scales:{x:{...CHART_BASE.scales.x},y:{...CHART_BASE.scales.y,grid:{display:false}}}}
  });
}

// Discount chart
function renderDiscount(){
  const stores=activeStores(), brands=activeBrands();
  const rows=RAW.discount.filter(r=>stores.includes(r.store)&&brands.includes(r.brand)).slice(0,12);
  kill('chartDiscount');
  if(!rows.length)return;
  CHARTS.chartDiscount=new Chart(document.getElementById('chartDiscount'),{
    type:'bar',
    data:{
      labels:rows.map(r=>`${r.brand} · ${r.store}`),
      datasets:[
        {label:'Items on Sale',data:rows.map(r=>r.count),backgroundColor:'#10b98177',hoverBackgroundColor:'#10b981',borderRadius:3,yAxisID:'y'},
        {label:'Avg % Off',data:rows.map(r=>r.avg_discount_pct),type:'line',borderColor:'#f59e0b',backgroundColor:'#f59e0b11',pointBackgroundColor:'#f59e0b',pointRadius:4,tension:0.35,fill:false,yAxisID:'y2'}
      ]
    },
    options:{
      ...CHART_BASE,
      scales:{
        x:{...CHART_BASE.scales.x,ticks:{...CHART_BASE.scales.x.ticks,maxRotation:38}},
        y:{...CHART_BASE.scales.y,title:{display:true,text:'Items',color:'#475569',font:{size:9}}},
        y2:{position:'right',ticks:{color:'#f59e0b',font:{size:10}},grid:{display:false},title:{display:true,text:'% Off',color:'#f59e0b',font:{size:9}}}
      }
    }
  });
}

// Table
function renderTable(){
  const stores=activeStores(), brands=activeBrands();
  const rows=RAW.expensive.filter(r=>stores.includes(r.store)&&brands.includes(r.brand));
  const tbody=document.getElementById('expensiveBody');
  if(!rows.length){tbody.innerHTML='<tr><td colspan="5" style="text-align:center;padding:1.5rem;color:var(--muted);font-size:0.78rem;">No data for current filters</td></tr>';return;}
  tbody.innerHTML=rows.map(r=>`<tr>
    <td>${sbadge(r.store)}</td>
    <td style="font-weight:600;color:#e2e8f0">${r.brand}</td>
    <td style="max-width:260px"><a href="${r.link||'#'}" target="_blank" style="color:#94a3b8;text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;max-width:260px" onmouseover="this.style.color='#a5b4fc'" onmouseout="this.style.color='#94a3b8'">${r.title||'—'}</a></td>
    <td style="font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:#475569">${r.item_number||'—'}</td>
    <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700;color:#fcd34d">$${r.price?parseFloat(r.price).toFixed(2):'—'}</td>
  </tr>`).join('');
}

function renderAll(){ renderBrand(); renderArrivals(); renderTheme(); renderDiscount(); renderTable(); }

async function init(){
  const kpiData = await fetch('/api/analytics/kpis').then(r=>r.json());
  // populate KPIs
  const defs=[
    {l:'Total Products',v:kpiData.total_products.toLocaleString()},
    {l:'Active Stores',v:kpiData.total_stores},
    {l:'On Sale',v:kpiData.discounted.toLocaleString()},
    {l:'New (7 days)',v:kpiData.new_arrivals_7d.toLocaleString()},
    {l:'Avg Price',v:'$'+kpiData.avg_price.toFixed(2)},
    {l:'Out of Stock',v:kpiData.out_of_stock.toLocaleString()},
  ];
  document.getElementById('kpiRow').innerHTML=defs.map((k,i)=>`
    <div class="kpi c${i} fade-up" style="animation-delay:${i*0.04}s">
      <div style="font-size:0.68rem;color:var(--muted);margin-bottom:0.45rem;font-family:'JetBrains Mono',monospace">${k.l}</div>
      <div style="font-size:1.55rem;font-weight:700;color:${KPI_COLORS[i]};font-family:'JetBrains Mono',monospace;letter-spacing:-0.03em">${k.v}</div>
    </div>`).join('');

  const [brand,arrivals,theme,discount,expensive]=await Promise.all([
    fetch('/api/analytics/items_per_brand_store').then(r=>r.json()),
    fetch('/api/analytics/new_arrivals_per_store').then(r=>r.json()),
    fetch('/api/analytics/items_per_theme_store').then(r=>r.json()),
    fetch('/api/analytics/discounts_per_brand_store').then(r=>r.json()),
    fetch('/api/analytics/most_expensive_per_brand_store').then(r=>r.json()),
  ]);
  RAW={brand,arrivals,theme,discount,expensive};
  ALL_STORES=[...new Set(brand.map(r=>r.store))].sort();
  ALL_BRANDS=[...new Set(brand.map(r=>r.brand))].sort();
  buildChips();
  renderAll();

  // ── Dynamic AI chips from real data ───────────────────────────────────────
  try {
    // Top store by product count
    const storeTotals = {};
    brand.forEach(r => { storeTotals[r.store] = (storeTotals[r.store]||0) + r.count; });
    const topStore = Object.entries(storeTotals).sort((a,b)=>b[1]-a[1])[0];

    // Top theme
    const themeTotals = {};
    theme.forEach(r => { themeTotals[r.theme] = (themeTotals[r.theme]||0) + r.count; });
    const topTheme = Object.entries(themeTotals).filter(([t])=>t&&t!=='Unknown').sort((a,b)=>b[1]-a[1])[0];

    // Store with most new arrivals
    const topArrivals = arrivals.sort((a,b)=>b.count-a.count)[0];

    // Store with most discounts
    const discountTotals = {};
    discount.forEach(r => { discountTotals[r.store] = (discountTotals[r.store]||0) + r.count; });
    const topDiscount = Object.entries(discountTotals).sort((a,b)=>b[1]-a[1])[0];

    const chips = [
      topStore    ? `Why does ${topStore[0]} have the most products (${topStore[1].toLocaleString()})?` : null,
      topTheme    ? `What LEGO sets are in the ${topTheme[0]} theme?` : null,
      `There are ${kpiData.discounted.toLocaleString()} products on sale — which are the best deals?`,
      topArrivals ? `What's new at ${topArrivals.store} recently?` : null,
      topDiscount ? `What discounts are available at ${topDiscount[0]}?` : null,
      `The average price is $${kpiData.avg_price.toFixed(2)} — is that good value?`,
    ].filter(Boolean).slice(0, 6);

    if (window.AI_UPDATE_CHIPS) window.AI_UPDATE_CHIPS(chips);
  } catch(e) {}
}
init();

// ── Export ──────────────────────────────────────────────────────────────────
function exportPDF() {
  document.getElementById('exportMenu').style.display = 'none';
  // Resize all charts so they render at full quality before printing
  Object.values(CHARTS).forEach(ch => { if (ch) { ch.resize(); ch.update('none'); } });
  setTimeout(() => window.print(), 300);
}

function toggleExport() {
  const m = document.getElementById('exportMenu');
  m.style.display = m.style.display === 'none' ? 'block' : 'none';
}
document.addEventListener('click', function(e) {
  const w = document.getElementById('exportWrap');
  if (w && !w.contains(e.target)) document.getElementById('exportMenu').style.display = 'none';
});

function exportChart(id) {
  document.getElementById('exportMenu').style.display = 'none';
  const canvas = document.getElementById(id);
  if (!canvas) return;
  // Draw on white-bg canvas for clean PNG
  const out = document.createElement('canvas');
  out.width = canvas.width; out.height = canvas.height;
  const ctx = out.getContext('2d');
  ctx.fillStyle = '#080c14';
  ctx.fillRect(0, 0, out.width, out.height);
  ctx.drawImage(canvas, 0, 0);
  const a = document.createElement('a');
  a.download = id + '_' + new Date().toISOString().slice(0,10) + '.png';
  a.href = out.toDataURL('image/png');
  a.click();
}

function exportAllCharts() {
  document.getElementById('exportMenu').style.display = 'none';
  ['chartBrand','chartArrivals','chartTheme','chartDiscount'].forEach((id, i) => {
    setTimeout(() => exportChart(id), i * 300);
  });
}
